<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GADzooks - No Repeats, No Clones</title>
  <style>
    body {
      font-family: 'Georgia', sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f4f4f4;
      color: #060606;
    }

    header {
      background-color: #ffffff;
      color: #000000;
      padding: 20px 0;
      text-align: center;
    }

    nav {
      display: flex;
      justify-content: center;
      background-color: #060606;
      padding: 10px 0;
      flex-wrap: wrap;
    }

    nav a {
      color: #fff;
      text-decoration: none;
      margin: 10px;
      font-size: 1.1rem;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    .product-grid {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .container {
      justify-content: center;
      text-align: center;
    }

    footer {
      text-align: center;
    }

    .product-card {
      background-color: #fff;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      text-align: center;
      width: 300px;
      cursor: pointer;
    }

    .product-card img {
      width: 100%;
      height: 300px;
      object-fit: cover;
      border-radius: 10px;
    }

    .product-card h3 {
      margin: 10px 0;
      font-size: 1.5rem;
    }

    @media (max-width: 768px) {
      nav {
        flex-direction: column;
        align-items: center;
      }

      .product-grid {
        flex-direction: column;
        align-items: center;
      }
    }
  </style>
</head>

<body>
  <header>
    <h1>GADzooks</h1>
    <p>No Repeats, No Clones</p>
  </header>

  <nav>
    <a href="#home">Home</a>
    <a href="#about">About</a>
    <a href="#products">Products</a>
    <a href="#contact">Contact</a>
  </nav>

  <section class="products" id="products">
    <div class="container">
      <h2>Our Products</h2>
      <div class="product-grid">
        <div class="product-card" onclick="openProduct('denim.html')">
          <img src="https://lh3.googleusercontent.com/d/1_rNnxKULIJrKR5KdiUIBIZgIg44Zt2jZ=w1000" alt="Denim Destructed">
          <h3>Denim Destructed</h3>
        </div>
        <div class="product-card" onclick="openProduct('streetknit.html')">


          <img src="https://lh3.googleusercontent.com/d/1jG5mOHlV3CT27SF3rI3jjvcyc8xcL6oN=w1000" alt="Street-Knit">
          <h3>Street-Knit</h3>
        </div>
      </div>
    </div>
    </div>
  </section>
  <section class="contact" id="contact">
    <div class="container">
      <h2>Contact Us</h2>
      <p>Have questions or want to collaborate? Reach out to us at <a
          href="mailto:info@gadzooks.com">info@gadzooks.com</a>.</p>

  </section>

  <footer>
    <p>&copy; 2025 GADzooks. All rights reserved. | Follow us on <a href="https://instagram.com/gadzooksoffside"
        target="_blank">Instagram</a></p>
  </footer>
  </div>
</body>

</html>
<script>
  function openProduct(url) {
    window.open(url, '_blank');
  }
</script>
</body>
</html>
